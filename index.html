
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEHN - Registro</title>
    <link rel="manifest" href="manifest.json">

  <style>

    body { font-family: sans-serif; background: #f4f6f8; padding: 20px; display: flex; justify-content: center; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { color: #1a73e8; margin-top: 0; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    #mensaje { margin-top: 15px; font-weight: bold; color: green; }
  </style>
</head>
<body>

<div class="card">
  <h2>Registro GEHN</h2>
  <form id="registroForm">
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <button type="submit">Registrar Suscriptor</button>
  </form>
  <div id="mensaje"></div>
</div>

<!-- SDKs de Firebase Modular CDN -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQPQqGLTwogLQtQPZUreCyOxQQPViobcU",
    authDomain: "gehn-107a0.firebaseapp.com",
    projectId: "gehn-107a0",
    storageBucket: "gehn-107a0.firebasestorage.app",
    messagingSenderId: "1058890124939",
    appId: "1:1058890124939:web:d04fae09aaf8e29e5c8e8e",
    measurementId: "G-V43BNVRFR5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('registroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nombre = document.getElementById('nombre').value;
    const email = document.getElementById('email').value;
    const msg = document.getElementById('mensaje');

    try {
      await addDoc(collection(db, "Usuarios"), {
        Nombre: nombre,
        Email: email,
        CreadoEn: new Date().toISOString()
      });
      msg.style.color = "green";
      msg.innerText = "¡Usuario guardado con éxito en Firestore!";
      document.getElementById('registroForm').reset();
    } catch (error) {
      msg.style.color = "red";
      msg.innerText = "Error al guardar: " + error.message;
    }
  });
</script>

</body>
</html>

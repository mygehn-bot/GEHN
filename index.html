<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEHN - Plataforma Oficial</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary: #15263b;
      --accent: #00b4d8;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    header img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    header h1 {
      color: var(--accent);
      font-size: 1.8rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }

    /* FORMULARIO */
    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: var(--bg);
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #38bdf8;
    }

    /* CHAT DE AGENTE GEHN */
    #chat-section {
      display: none; /* Se activa tras suscribirse o iniciar */
      margin-top: 15px;
    }

    .chat-box {
      height: 320px;
      background: var(--bg);
      border-radius: 10px;
      padding: 15px;
      overflow-y: auto;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .msg.bot {
      background: #334155;
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .msg.user {
      background: var(--accent);
      color: #000;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .chat-input-container {
      display: flex;
      gap: 8px;
    }

    .chat-input-container input {
      flex: 1;
    }

    .chat-input-container button {
      width: auto;
      padding: 0 18px;
    }

    #msg-status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--accent);
    }
  </style>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <header>
    <img src="logo.jpg" alt="GEHN Logo">
    <h1>Ecosistema GEHN</h1>
  </header>

  <div class="container">
    <!-- SECCIÓN REGISTRO -->
    <div id="register-section">
      <h2 style="margin-bottom: 15px; text-align: center; font-size: 1.3rem;">Registro de Suscriptor</h2>
      <form id="subscribeForm">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
        </div>
        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
        </div>
        <button type="submit" id="btnSubmit">Acceder a GEHN AI</button>
      </form>
      <div id="msg-status"></div>
    </div>

    <!-- SECCIÓN CHAT IA -->
    <div id="chat-section">
      <h3 style="margin-bottom: 10px; color: var(--accent);">Agente Inteligente GEHN</h3>
      <div class="chat-box" id="chatBox">
        <div class="msg bot">¡Hola! Soy el asistente virtual del Ecosistema GEHN. ¿En qué te puedo ayudar hoy?</div>
      </div>
      <div class="chat-input-container">
        <input type="text" id="userMsg" placeholder="Escribe tu consulta...">
        <button onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDQPgQGLTwqLQtQPZUreCy0xQQPViobcu",
      authDomain: "gehn-107a0.firebaseapp.com",
      projectId: "gehn-107a0",
      storageBucket: "gehn-107a0.firebasestorage.app",
      messagingSenderId: "1058890124939",
      appId: "1:1058890124939:web:d04fae09aaf8e29e5c8e8e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById('subscribeForm');
    const statusDiv = document.getElementById('msg-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const correo = document.getElementById('correo').value;

      statusDiv.textContent = "Conectando al ecosistema...";

      try {
        await db.collection("Usuarios").add({
          Nombre: nombre,
          Email: correo,
          CreadoEn: new Date().toISOString()
        });

        statusDiv.textContent = "¡Bienvenido a GEHN!";
        
        // Ocultar registro y mostrar chat
        setTimeout(() => {
          document.getElementById('register-section').style.display = 'none';
          document.getElementById('chat-section').style.display = 'block';
        }, 1000);

      } catch (error) {
        console.error("Error guardando datos:", error);
        statusDiv.textContent = "Ocurrió un error. Intenta de nuevo.";
      }
    });
// Lógica del Chat e Integración con Gemini
    const GEMINI_API_KEY = "AQ.Ab8RN6IrvuGHQheo93tz8-kgrcB4xRV4VY9Rqy8bdrwqG4UEg"; // Tu clave copiada

    async function sendMessage() {
      const input = document.getElementById('userMsg');
      const chatBox = document.getElementById('chatBox');
      const text = input.value.trim();

      if (!text) return;

      // 1. Mostrar mensaje del usuario
      const userMsgDiv = document.createElement('div');
      userMsgDiv.className = 'msg user';
      userMsgDiv.textContent = text;
      chatBox.appendChild(userMsgDiv);

      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // 2. Indicador de respuesta
      const botMsgDiv = document.createElement('div');
      botMsgDiv.className = 'msg bot';
      botMsgDiv.textContent = "GEHN AI está pensando...";
      chatBox.appendChild(botMsgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: text }]
            }]
          })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
          botMsgDiv.textContent = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
          botMsgDiv.textContent = "Error de Google: " + data.error.message;
        } else {
          botMsgDiv.textContent = "No se recibió respuesta válida.";
        }
      } catch (error) {
        console.error("Error al conectar con la API:", error);
        botMsgDiv.textContent = "Error de conexión con el servidor.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>

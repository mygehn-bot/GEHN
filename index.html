<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEHN - Plataforma Oficial</title>
  <style>
    :root {
      --primary: #00d2ff;
      --accent: #0082c8;
      --bg: #0f2027;
      --card-bg: #203a43;
      --text: #ffffff;
      --text-muted: #a0aec0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(32, 58, 67, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--primary);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .chat-box {
      height: 300px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
      background: rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 14px;
    }

    .msg.user {
      background: var(--accent);
      align-self: flex-end;
    }

    .msg.bot {
      background: rgba(255, 255, 255, 0.1);
      align-self: flex-start;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    .input-group input {
      margin-bottom: 0;
    }

    .input-group button {
      width: auto;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- SECCIÓN DE REGISTRO -->
    <div id="register-section">
      <h2>Ecosistema GEHN</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">Ingresa tus datos para acceder al Agente Inteligente</p>
      
      <form id="regForm">
        <input type="text" id="regName" placeholder="Tu nombre" required>
        <input type="email" id="regEmail" placeholder="Tu correo electrónico" required>
        <button type="submit">Ingresar</button>
      </form>
    </div>

    <!-- SECCIÓN DE CHAT -->
    <div id="chat-section" style="display: none;">
      <h2>Agente Inteligente GEHN</h2>
      <div class="chat-box" id="chatBox">
        <div class="msg bot">¡Hola! Soy el asistente virtual del Ecosistema GEHN. ¿En qué te puedo ayudar hoy?</div>
      </div>
      <div class="input-group">
        <input type="text" id="userMsg" placeholder="Escribe tu consulta...">
        <button type="button" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    // Manejo del Formulario de Registro
    document.getElementById('regForm').addEventListener('submit', function(event) {
      event.preventDefault(); // EVITA QUE SE RECARGUE O BORRE LA PÁGINA
      
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;

      if (name && email) {
        document.getElementById('register-section').style.display = 'none';
        document.getElementById('chat-section').style.display = 'block';
      }
    });

    // Integración con Gemini API
    const GEMINI_API_KEY = "AQ.Ab8RN6IrvuGHQheo93tz8-kgrcB4xRV4VY9Rqy8bdrwqG4UEg";

    async function sendMessage() {
      const input = document.getElementById('userMsg');
      const chatBox = document.getElementById('chatBox');
      const text = input.value.trim();

      if (!text) return;

      // Mensaje del usuario
      const userMsgDiv = document.createElement('div');
      userMsgDiv.className = 'msg user';
      userMsgDiv.textContent = text;
      chatBox.appendChild(userMsgDiv);

      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Estado pensando
      const botMsgDiv = document.createElement('div');
      botMsgDiv.className = 'msg bot';
      botMsgDiv.textContent = "GEHN AI está pensando...";
      chatBox.appendChild(botMsgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: text }] }]
          })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
          botMsgDiv.textContent = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
          botMsgDiv.textContent = "Error de Google: " + data.error.message;
        } else {
          botMsgDiv.textContent = "No se recibió una respuesta válida.";
        }
      } catch (error) {
        console.error("Error:", error);
        botMsgDiv.textContent = "Error de conexión con el servidor.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
